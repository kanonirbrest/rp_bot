<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Поделиться номером</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #ffffff);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--tg-theme-text-color, #ffffff);
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--tg-theme-hint-color, #aaaaaa);
      margin-bottom: 32px;
      max-width: 280px;
    }

    .btn {
      background: var(--tg-theme-button-color, #6c63ff);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 14px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .skip {
      margin-top: 16px;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #888888);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #aaaaaa);
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="icon">📱</div>
  <h1>Поделись номером</h1>
  <p>Чтобы получать скидки, анонсы мероприятий и участвовать в розыгрышах — оставь номер телефона.</p>

  <button class="btn" id="shareBtn">Поделиться номером</button>
  <div class="skip" id="skipBtn">Пропустить</div>
  <div class="status" id="status"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const shareBtn = document.getElementById("shareBtn");
    const skipBtn = document.getElementById("skipBtn");
    const status = document.getElementById("status");

    shareBtn.addEventListener("click", () => {
      shareBtn.disabled = true;
      status.textContent = "Ожидаем разрешение...";

      tg.requestContact((result, contact) => {
        if (result && contact) {
          tg.sendData(JSON.stringify({
            action: "contact",
            phone: contact.contact.phone_number
          }));
        } else {
          shareBtn.disabled = false;
          status.textContent = "Не удалось получить номер. Попробуй ещё раз.";
        }
      });
    });

    skipBtn.addEventListener("click", () => {
      tg.sendData(JSON.stringify({ action: "skip" }));
    });
  </script>
</body>
</html>
