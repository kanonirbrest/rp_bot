<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Карта — Небо.Река</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #4f8ef7;
      --c2: #c070ff;
      --c3: #35d4a0;
      --c4: #ff7c3e;
      --c5: #ff4f9e;
      --c6: #f0c060;
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #262626;
      --text:    #f0f0f0;
      --muted:   #666;
    }

    @keyframes spin      { from { transform:rotate(0deg) }   to { transform:rotate(360deg) } }
    @keyframes sway      { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
    @keyframes beam-rock { 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
    @keyframes bob       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pulse     { 0%,100%{opacity:.9} 50%{opacity:.3} }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 18px 20px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.2rem;
      letter-spacing: .25em;
      font-weight: 700;
      background: linear-gradient(135deg, #f0c060, #e8d5b0, #fff8e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      font-size: .6rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: .18em;
    }

    /* ── Map ── */
    .map-hint {
      font-size: .58rem;
      color: #383838;
      letter-spacing: .14em;
      margin: 10px 0 4px;
      text-align: center;
    }
    .map-outer {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 6px;
      scrollbar-width: none;
    }
    .map-outer::-webkit-scrollbar { display: none; }
    .map-inner {
      position: relative;
      width: 820px;
      height: 288px;
      margin: 0 14px;
    }
    .floor-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .dots-layer {
      position: absolute;
      inset: 0;
    }

    /* ── Zone dot ── */
    .zdot {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      background: rgba(0,0,0,.65);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .56rem;
      font-weight: 700;
      cursor: pointer;
      transform: translate(-50%,-50%);
      transition: transform .15s, box-shadow .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }
    .zdot:active          { transform: translate(-50%,-50%) scale(1.25); }
    .zdot.active          { transform: translate(-50%,-50%) scale(1.15); box-shadow: 0 0 12px currentColor; background: rgba(0,0,0,.85); }

    /* ── Info panel ── */
    .info-panel {
      width: calc(100% - 28px);
      max-width: 640px;
      margin: 10px 0 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      transition: border-color .2s;
    }
    .info-empty {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .78rem;
    }
    .info-top {
      display: flex;
      gap: 14px;
      padding: 14px 16px 10px;
      align-items: flex-start;
    }
    .info-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
    }
    .info-meta   { flex: 1; }
    .info-num    { font-size: .54rem; letter-spacing: .18em; font-weight: 700; margin-bottom: 3px; }
    .info-title  { font-size: .98rem; font-weight: 700; line-height: 1.15; margin-bottom: 4px; }
    .info-tag    { display:inline-block; font-size:.52rem; letter-spacing:.12em; padding:2px 8px; border-radius:20px; font-weight:600; }
    .info-desc   { padding:0 16px 10px; font-size:.75rem; color:#999; line-height:1.8; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
    .info-notes  { margin:0 16px 14px; padding:10px 12px; border-radius:8px; background:rgba(255,180,0,.05); border:1px solid rgba(255,180,0,.18); }
    .info-notes-hd   { font-size:.6rem; font-weight:700; color:#e6a000; letter-spacing:.12em; margin-bottom:5px; }
    .info-notes-body { font-size:.7rem; color:#aa7700; line-height:1.7; white-space:pre-wrap; }

    /* ── Zone list ── */
    .sec-title {
      width: calc(100% - 28px);
      max-width: 640px;
      font-size: .58rem;
      letter-spacing: .22em;
      color: var(--muted);
      margin: 18px 0 8px;
    }
    .zones-list {
      width: calc(100% - 28px);
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .zitem {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .18s, background .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .zitem.active          { background: rgba(255,255,255,.03); }
    .znum {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 700; flex-shrink: 0;
    }
    .zname { font-size: .78rem; color: #bbb; line-height: 1.3; }
    .zitem.active .zname { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>НЕБО · РЕКА</h1>
  <p>ПЛАН ВЫСТАВКИ · 23 ЗОНЫ</p>
</header>

<div class="map-hint">← прокрути карту →</div>

<div class="map-outer">

      <circle cx="178" cy="148" r="13" fill="rgba(55,150,80,.04)" stroke="rgba(55,150,80,.1)"  stroke-width="1"/>

      <circle cx="732" cy="118" r="60" fill="rgba(30,55,110,.08)" stroke="rgba(70,110,200,.1)" stroke-width="1" stroke-dasharray="5 4"/>
      <circle cx="732" cy="118" r="38" fill="rgba(30,55,110,.06)" stroke="rgba(70,110,200,.1)" stroke-width="1"/>
      <!-- Water in right room -->
      <rect x="658" y="200" width="148" height="52" rx="5" fill="rgba(53,212,160,.04)" stroke="rgba(53,212,160,.1)" stroke-width="1"/>

      <!-- WC markers -->
      <rect x="440" y="198" width="28" height="20" rx="3" fill="rgba(60,60,60,.2)" stroke="#2a2a2a" stroke-width="1"/>
      <text x="454" y="211" text-anchor="middle" fill="#333" font-size="6" font-family="Helvetica">WC</text>
      <rect x="476" y="198" width="28" height="20" rx="3" fill="rgba(60,60,60,.2)" stroke="#2a2a2a" stroke-width="1"/>
      <text x="490" y="211" text-anchor="middle" fill="#333" font-size="6" font-family="Helvetica">WC</text>

      <!-- Subtle area labels -->
      <text x="52"  y="66"  text-anchor="middle" fill="#1e1e1e" font-size="6.5" font-family="Helvetica" letter-spacing="1">ВХОД</text>
      <text x="192" y="176" text-anchor="middle" fill="#1a2a1a" font-size="6"   font-family="Helvetica" letter-spacing="1">ОРАНЖЕРЕЯ</text>
      <text x="371" y="152" text-anchor="middle" fill="#141e28" font-size="6"   font-family="Helvetica" letter-spacing="1">ЦЕНТР</text>
      <text x="732" y="128" text-anchor="middle" fill="#141428" font-size="6"   font-family="Helvetica" letter-spacing="1">ПЛАНЕТА</text>
    </svg>

    <!-- Zone dots (injected by JS) -->
    <div class="dots-layer" id="dots"></div>
  </div>
</div>

<div class="info-panel" id="info">
  <div class="info-empty">Нажми на зону, чтобы узнать подробнее</div>
</div>

<div class="sec-title">ВСЕ ЗОНЫ</div>
<div class="zones-list" id="zlist"></div>

const C = { c1:'var(--c1)', c2:'var(--c2)', c3:'var(--c3)', c4:'var(--c4)', c5:'var(--c5)', c6:'var(--c6)' };

let active = null;
const infoEl = document.getElementById('info');
const dotsEl = document.getElementById('dots');
const zlistEl = document.getElementById('zlist');

function select(id) {
  if (active === id) {
    active = null;
    document.querySelectorAll('.zdot,.zitem').forEach(el => el.classList.remove('active'));
    infoEl.style.borderColor = '';
    infoEl.innerHTML = '<div class="info-empty">Нажми на зону, чтобы узнать подробнее</div>';
    return;
  }
  active = id;
  document.querySelectorAll('.zdot,.zitem').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el => el.classList.add('active'));

  const z   = ZONES.find(z => z.id === id);
  const col = C[z.color];

  infoEl.style.borderColor = col.replace('var(--','').replace(')','');
  infoEl.style.borderColor = `color-mix(in srgb, ${col} 50%, transparent)`;
  infoEl.innerHTML = `
    <div class="info-top">
      <div class="info-icon" style="background:color-mix(in srgb,${col} 10%,transparent)">${ICONS[id]}</div>
      <div class="info-meta">
        <div class="info-num" style="color:${col}">ЗОНА ${id} · ${z.tag}</div>
        <div class="info-title">${z.title}</div>
      </div>
    </div>
    <div class="info-desc">${z.desc.replace(/\n/g,'<br>')}</div>
    ${z.notes ? `<div class="info-notes"><div class="info-notes-hd">⚠ ВАЖНО</div><div class="info-notes-body">${z.notes.replace(/\n/g,'<br>')}</div></div>` : ''}
  `;

  if (window.Telegram?.WebApp?.HapticFeedback)
    Telegram.WebApp.HapticFeedback.impactOccurred('light');

  infoEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

ZONES.forEach(z => {
  const col = C[z.color];

  // dot
  const dot = document.createElement('div');
  dot.className = 'zdot';
  dot.dataset.id = z.id;
  dot.style.left  = z.pos.left;
  dot.style.top   = z.pos.top;
  dot.style.color = col;
  dot.textContent = z.id;
  dot.addEventListener('click', () => select(z.id));
  dotsEl.appendChild(dot);

  // list item
  const item = document.createElement('div');
  item.className = 'zitem';
  item.dataset.id = z.id;
  item.innerHTML = `
    <div class="znum" style="color:${col};border-color:color-mix(in srgb,${col} 55%,transparent)">${z.id}</div>
    <div class="zname">${z.title}</div>
  `;
  item.addEventListener('click', () => select(z.id));
  zlistEl.appendChild(item);
});

// auto-open zone from Telegram startapp param or ?zone=
const tgParam  = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
const urlZone  = parseInt(tgParam || new URLSearchParams(location.search).get('zone'));
if (urlZone >= 1 && urlZone <= 23) {
  setTimeout(() => {
    select(urlZone);
    infoEl.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 600);
}
</script>
