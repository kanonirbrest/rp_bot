<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Карта — Небо.Река</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #4f8ef7;
      --c2: #c070ff;
      --c3: #35d4a0;
      --c4: #ff7c3e;
      --c5: #ff4f9e;
      --c6: #f0c060;
      --bg:      #060e10;
      --surface: rgba(255,255,255,.05);
      --border:  rgba(255,255,255,.09);
      --text:    #f0f0f0;
      --muted:   #778;
      --glass-bg:     rgba(10,24,28,.55);
      --glass-border: rgba(255,255,255,.1);
    }

    @keyframes spin      { from { transform:rotate(0deg) }   to { transform:rotate(360deg) } }
    @keyframes sway      { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
    @keyframes beam-rock { 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
    @keyframes bob       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pulse     { 0%,100%{opacity:.9} 50%{opacity:.3} }
    @keyframes dot-ring  {
      0%   { box-shadow: 0 0 0 0 var(--dot-col), 0 2px 8px rgba(0,0,0,.5); opacity:1; }
      70%  { box-shadow: 0 0 0 8px transparent,  0 2px 8px rgba(0,0,0,.5); opacity:1; }
      100% { box-shadow: 0 0 0 8px transparent,  0 2px 8px rgba(0,0,0,.5); opacity:1; }
    }

    body {
      background:
        radial-gradient(ellipse 70% 45% at 15% 0%,   rgba(255, 79,163,.18) 0%, transparent 100%),
        radial-gradient(ellipse 60% 50% at 85% 100%,  rgba(53,212,160,.14) 0%, transparent 100%),
        radial-gradient(ellipse 80% 60% at 50%  40%,  rgba(20, 80,100,.35) 0%, transparent 100%),
        #060e10;
      background-attachment: fixed;
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 18px 20px 10px;
      text-align: center;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
    }
    header h1 {
      font-size: 1.2rem;
      letter-spacing: .25em;
      font-weight: 700;
      background: linear-gradient(135deg, #f0c060, #e8d5b0, #fff8e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      font-size: .6rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: .18em;
    }

    /* ── Floor switcher ── */
    .floor-switcher {
      display: flex;
      gap: 6px;
      padding: 10px 14px 6px;
      align-self: flex-start;
    }
    .fsw {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .14em;
      cursor: pointer;
      transition: background .18s, color .18s, border-color .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .fsw.active {
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.3);
      color: var(--text);
    }

    /* ── Map ── */
    .map-hint {
      font-size: .58rem;
      color: #383838;
      letter-spacing: .14em;
      margin: 10px 0 4px;
      text-align: center;
    }
    .map-outer {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 6px;
      scrollbar-width: none;
    }
    .map-outer::-webkit-scrollbar { display: none; }
    .map-inner {
      position: relative;
      width: 787px;
      height: 355px;
      margin: 0 14px;
      transform-origin: 0 0;
      transition: transform 1.3s cubic-bezier(.4,0,.2,1);
      border-radius: 10px;
      overflow: hidden;
    }
    .floor-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .dots-layer { z-index: 2; }
    .dots-layer {
      position: absolute;
      inset: 0;
    }

    /* ── Zone dot: кликабельные круги накладываются на круги плана (pos — из calibrate.html) */
    .zdot {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 1px 5px rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .6rem;
      font-weight: 800;
      color: #111;
      cursor: pointer;
      transform: translate(-50%,-50%);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      letter-spacing: -.01em;
    }
    .zdot.pink {
      background: #ff4fa3;
      color: #fff;
    }
    .zdot:active {
      transform: translate(-50%,-50%) scale(1.22);
    }
    .zdot.active {
      transform: translate(-50%,-50%) scale(1.25);
      z-index: 20;
      animation: dot-ring .8s ease-out infinite;
      box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 0 12px var(--dot-col), 0 2px 8px rgba(0,0,0,.4);
    }
    .zdot.active:not(.pink) {
      background: var(--dot-col);
      color: #fff;
    }
    .zdot.active.pink {
      background: #ff1f85;
      box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 0 14px #ff4fa3, 0 2px 8px rgba(0,0,0,.4);
    }

    /* ── Info panel ── */
    .info-panel {
      width: calc(100% - 28px);
      max-width: 640px;
      margin: 10px 0 0;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      overflow: hidden;
      transition: border-color .2s;
    }
    .info-empty {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .78rem;
    }
    .info-top {
      display: flex;
      gap: 14px;
      padding: 14px 16px 10px;
      align-items: flex-start;
    }
    .info-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
    }
    .info-meta   { flex: 1; }
    .info-num    { font-size: .54rem; letter-spacing: .18em; font-weight: 700; margin-bottom: 3px; }
    .info-title  { font-size: .98rem; font-weight: 700; line-height: 1.15; margin-bottom: 4px; }
    .info-tag    { display:inline-block; font-size:.52rem; letter-spacing:.12em; padding:2px 8px; border-radius:20px; font-weight:600; }
    .info-desc   { padding:0 16px 10px; font-size:.75rem; color:#999; line-height:1.8; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
    .info-notes  { margin:0 16px 14px; padding:10px 12px; border-radius:8px; background:rgba(255,180,0,.05); border:1px solid rgba(255,180,0,.18); }
    .info-notes-hd   { font-size:.6rem; font-weight:700; color:#e6a000; letter-spacing:.12em; margin-bottom:5px; }
    .info-notes-body { font-size:.7rem; color:#aa7700; line-height:1.7; white-space:pre-wrap; }

    /* ── Zone list ── */
    .sec-title {
      width: calc(100% - 28px);
      max-width: 640px;
      font-size: .58rem;
      letter-spacing: .22em;
      color: var(--muted);
      margin: 18px 0 8px;
    }
    .zones-list {
      width: calc(100% - 28px);
      max-width: 640px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .zitem {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      cursor: pointer;
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      transition: border-color .18s, background .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .zitem.active {
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.18);
    }
    .znum {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 700; flex-shrink: 0;
    }
    .zname { font-size: .78rem; color: #bbb; line-height: 1.3; }
    .zitem.active .zname { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>НЕБО · РЕКА</h1>
  <p>ПЛАН ВЫСТАВКИ · 21 ЗОНА</p>
</header>

<div class="floor-switcher">
  <button class="fsw" data-floor="1">1 ЭТАЖ</button>
  <button class="fsw" data-floor="2">2 ЭТАЖ</button>
</div>

<div class="map-outer">
  <div class="map-inner">

    <!-- ── Floor plan photo ── -->
    <img class="floor-img" src="map.jpg" alt="План выставки" draggable="false"/>

    <!-- Zone dots (injected by JS) -->
    <div class="dots-layer" id="dots"></div>
  </div>
</div>

<div class="info-panel" id="info">
  <div class="info-empty">Нажми на зону, чтобы узнать подробнее</div>
</div>

<div class="sec-title" id="sec-title">ВСЕ ЗОНЫ</div>
<div class="zones-list" id="zlist"></div>

const C = { c1:'var(--c1)', c2:'var(--c2)', c3:'var(--c3)', c4:'var(--c4)', c5:'var(--c5)', c6:'var(--c6)' };

let active = null;
let currentFloor = null; // null = все этажи
const infoEl    = document.getElementById('info');
const dotsEl    = document.getElementById('dots');
const zlistEl   = document.getElementById('zlist');
const secTitle  = document.getElementById('sec-title');
const mapInner  = document.querySelector('.map-inner');
const mapOuter  = document.querySelector('.map-outer');

function applyFloor(floor) {
  currentFloor = floor;
  secTitle.textContent = floor ? `ЗОНЫ · ${floor} ЭТАЖ` : 'ВСЕ ЗОНЫ';
  document.querySelectorAll('.fsw').forEach(b =>
    b.classList.toggle('active', floor !== null && +b.dataset.floor === floor));

  // сбросить выбранную зону если она не на этом этаже
  if (active !== null && floor !== null) {
    const isFloor2 = PINK_ZONES.has(active);
    if ((floor === 2) !== isFloor2) {
      active = null;
      document.querySelectorAll('.zdot,.zitem').forEach(el => el.classList.remove('active'));
      infoEl.style.borderColor = '';
      infoEl.innerHTML = '<div class="info-empty">Нажми на зону, чтобы узнать подробнее</div>';
      zoomToZone(null);
    }
  }

  document.querySelectorAll('.zdot').forEach(el => {
    const id = +el.dataset.id;
    el.style.display = (floor === null || PINK_ZONES.has(id) === (floor === 2)) ? '' : 'none';
  });
  document.querySelectorAll('.zitem').forEach(el => {
    const id = +el.dataset.id;
    el.style.display = (floor === null || PINK_ZONES.has(id) === (floor === 2)) ? '' : 'none';
  });
}

document.querySelectorAll('.fsw').forEach(btn => {
  btn.addEventListener('click', () => {
    const floor = +btn.dataset.floor;
    // повторный клик снимает фильтр
    applyFloor(currentFloor === floor ? null : floor);
  });
});


const ZOOM_SCALE = 1.15;

function zoomToZone(zone) {
  const mapH = 355;
  const MARGIN = 14;

  if (!zone) {
    mapInner.style.transform = '';
    mapOuter.style.overflowX = 'auto';
    return;
  }

  const S          = ZOOM_SCALE;
  const MAP_W      = 787;
  const cx         = MAP_W * parseFloat(zone.pos.left) / 100;
  const cy         = mapH  * parseFloat(zone.pos.top)  / 100;
  const outerW     = mapOuter.clientWidth;
  const scrollLeft = mapOuter.scrollLeft;

  const rawTx = outerW / 2 - MARGIN - cx * S + scrollLeft;
  const rawTy = mapH   / 2 - cy * S;

  // clamp so map edges never go beyond the viewport (scrollLeft factored in)
  const tx = Math.min(scrollLeft - MARGIN, Math.max(outerW - MARGIN - MAP_W * S + scrollLeft, rawTx));
  const ty = Math.min(0,                   Math.max(mapH * (1 - S),                           rawTy));

  mapOuter.style.overflowX = 'hidden';
  mapInner.style.transform = `translate(${tx}px, ${ty}px) scale(${S})`;
}

function select(id) {
  if (active === id) {
    active = null;
    document.querySelectorAll('.zdot,.zitem').forEach(el => el.classList.remove('active'));
    infoEl.style.borderColor = '';
    infoEl.innerHTML = '<div class="info-empty">Нажми на зону, чтобы узнать подробнее</div>';
    zoomToZone(null);
    return;
  }
  active = id;
  document.querySelectorAll('.zdot,.zitem').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el => el.classList.add('active'));

  const z   = ZONES.find(z => z.id === id);
  const col = PINK_ZONES.has(id) ? PINK_COL : ORANGE_ZONES.has(id) ? ORANGE_COL : C[z.color];

  infoEl.style.borderColor = col.replace('var(--','').replace(')','');
  infoEl.style.borderColor = `color-mix(in srgb, ${col} 50%, transparent)`;
  infoEl.innerHTML = `
    <div class="info-top">
      <div class="info-icon" style="background:color-mix(in srgb,${col} 10%,transparent)">${ICONS[ICON_MAP[id] || id]}</div>
      <div class="info-meta">
        <div class="info-num" style="color:${col}">ЗОНА ${id} · ${z.tag}</div>
        <div class="info-title">${z.title}</div>
      </div>
    </div>
    <div class="info-desc">${z.desc.replace(/\n/g,'<br>')}</div>
    ${z.notes ? `<div class="info-notes"><div class="info-notes-hd">⚠ ВАЖНО</div><div class="info-notes-body">${z.notes.replace(/\n/g,'<br>')}</div></div>` : ''}
  `;

  if (window.Telegram?.WebApp?.HapticFeedback)
    Telegram.WebApp.HapticFeedback.impactOccurred('light');

  zoomToZone(z);
  setTimeout(() => infoEl.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
}

const PINK_ZONES   = new Set([4, 12, 13, 14, 19, 20, 21]);
const PINK_COL     = '#ff4fa3';
const ORANGE_ZONES = new Set([10]);
const ORANGE_COL   = '#ff7c3e';

ZONES.forEach(z => {
  const isPink   = PINK_ZONES.has(z.id);
  const isOrange = ORANGE_ZONES.has(z.id);
  const col = isPink ? PINK_COL : isOrange ? ORANGE_COL : C[z.color];

  // dot
  const dot = document.createElement('div');
  dot.className = 'zdot';
  dot.dataset.id = z.id;
  dot.style.left  = z.pos.left;
  dot.style.top   = z.pos.top;
  dot.style.setProperty('--dot-col', col);
  if (isPink) dot.classList.add('pink');
  dot.textContent = z.id;
  dot.addEventListener('click', () => select(z.id));
  dotsEl.appendChild(dot);

  // list item
  const item = document.createElement('div');
  item.className = 'zitem';
  item.dataset.id = z.id;
  item.innerHTML = `
    <div class="znum" style="color:${col};border-color:color-mix(in srgb,${col} 55%,transparent)">${z.id}</div>
    <div class="zname">${z.title}</div>
  `;
  item.addEventListener('click', () => select(z.id));
  zlistEl.appendChild(item);
});

// deselect on click outside dots
mapInner.addEventListener('click', e => {
  if (active !== null && !e.target.closest('.zdot')) select(active);
});

// по умолчанию показываем все зоны
applyFloor(null);

// auto-open zone from Telegram startapp param or ?zone=
const tgParam  = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
const urlZone  = parseInt(tgParam || new URLSearchParams(location.search).get('zone'));
if (urlZone >= 1 && urlZone <= 21) {
  setTimeout(() => {
    applyFloor(PINK_ZONES.has(urlZone) ? 2 : 1);
    select(urlZone);
    infoEl.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 600);
}
</script>
